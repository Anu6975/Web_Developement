3. External CSS


        -> we create .html and .css files seperately and links both files using - <link rel="stylesheet" type="text/css" href="style.css"> where rel= relation which is compulasary to write


if all the css types are used on the one tag preference is-
    1. inline 2. internal 3. external

what happens when all three css are used? 


CSS Selectors

1. Element / Tag Selector   : this selects the html element by name ex. h1 ; it applies the style to all the h1 tag
2. Id Selector              : selects id attribute of an html element to select the specific element; it should be unique within page ex. <h1 id="abc"> call the id by the #abc in css file
3. Class Selector           : we can use it in multiple tags of html and to add the style to multiple tags 
4. Universal Selector       : selects all the elements on the page; syntax is to use "*" in style tag
5. Groups Selector          : selects all the elements with same style definitions; used to minimize the code; commas are used to seperate each selector in grouping ; we can use id, class, tags together in group selector

Class and Group Selectors are used widely in projects all the above are selectors are called simple selectors in CSS
